<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Secret Garden</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.4);
      color: #fff;
      font-family: Georgia, serif;
      font-size: 1.4rem;
      cursor: pointer;
      z-index: 10;
      letter-spacing: 0.05em;
    }
    #overlay.hidden { display: none; }

    #loading-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-family: Georgia, serif;
      z-index: 100;
      transition: opacity 0.6s;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loading-flower {
      position: relative;
      width: 80px;
      height: 100px;
      margin-bottom: 12px;
      animation: flower-sway 3s ease-in-out infinite;
      transform-origin: bottom center;
    }
    /* Stem */
    #loading-flower .stem {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 3px;
      height: 50px;
      background: #5a9a48;
      border-radius: 2px;
      transform: translateX(-50%);
    }
    #loading-flower .leaf {
      position: absolute;
      bottom: 18px;
      width: 14px;
      height: 8px;
      background: #6abf50;
      border-radius: 50%;
    }
    #loading-flower .leaf.left {
      left: 50%;
      transform: translateX(-14px) rotate(-30deg);
    }
    #loading-flower .leaf.right {
      left: 50%;
      transform: translateX(2px) rotate(30deg);
    }
    /* Flower head */
    #loading-flower .head {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 40px;
      animation: flower-bloom 2s ease-out forwards;
    }
    #loading-flower .petal {
      position: absolute;
      width: 16px;
      height: 16px;
      background: #ffb7d5;
      border-radius: 50%;
      top: 50%;
      left: 50%;
    }
    #loading-flower .petal:nth-child(1) { transform: translate(-50%, -50%) translateY(-10px); background: #ffcce0; }
    #loading-flower .petal:nth-child(2) { transform: translate(-50%, -50%) rotate(72deg) translateY(-10px); background: #ffc0d6; }
    #loading-flower .petal:nth-child(3) { transform: translate(-50%, -50%) rotate(144deg) translateY(-10px); background: #ffd6e8; }
    #loading-flower .petal:nth-child(4) { transform: translate(-50%, -50%) rotate(216deg) translateY(-10px); background: #ffb7d5; }
    #loading-flower .petal:nth-child(5) { transform: translate(-50%, -50%) rotate(288deg) translateY(-10px); background: #ffcce0; }
    #loading-flower .center {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #ffe570;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 6px rgba(255, 229, 112, 0.5);
    }
    @keyframes flower-sway {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    @keyframes flower-bloom {
      0% { transform: translateX(-50%) scale(0); opacity: 0; }
      50% { transform: translateX(-50%) scale(1.15); opacity: 1; }
      100% { transform: translateX(-50%) scale(1); opacity: 1; }
    }
    #loading-text {
      font-size: 1.4rem;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
    }
    #loading-bar-bg {
      width: 220px;
      height: 18px;
      background: #222;
      border: 2px solid #555;
      display: flex;
      gap: 2px;
      padding: 2px;
    }
    .load-block {
      flex: 1;
      height: 100%;
      background: #333;
    }
    .load-block.filled {
      background: #5a9a48;
    }

    /* Chat */
    #chat-input {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 360px;
      padding: 10px 16px;
      border: none;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-family: sans-serif;
      font-size: 1rem;
      outline: none;
      backdrop-filter: blur(6px);
      z-index: 20;
      display: none;
    }
    #chat-input::placeholder { color: rgba(255,255,255,0.5); }

    #chat-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 18px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-family: sans-serif;
      font-size: 0.9rem;
      backdrop-filter: blur(6px);
      z-index: 20;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #chat-toast.visible { opacity: 1; }

    /* ── Mobile touch controls ── */
    #mobile-joystick {
      display: none;
      position: fixed;
      bottom: 40px;
      left: 40px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.25);
      z-index: 15;
      touch-action: none;
    }
    #mobile-joystick-knob {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    #mobile-chat-btn {
      display: none;
      position: fixed;
      bottom: 48px;
      right: 40px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.45);
      border: 2px solid rgba(255, 255, 255, 0.25);
      color: #fff;
      font-size: 1.4rem;
      z-index: 15;
      cursor: pointer;
      backdrop-filter: blur(4px);
      touch-action: none;
      line-height: 52px;
      text-align: center;
    }
    .mobile-active #mobile-joystick,
    .mobile-active #mobile-chat-btn {
      display: block;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div id="loading-flower">
      <div class="head">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="center"></div>
      </div>
      <div class="stem"></div>
      <div class="leaf left"></div>
      <div class="leaf right"></div>
    </div>
    <div id="loading-text">Loading meadow...</div>
    <div id="loading-bar-bg">
      <div class="load-block"></div><div class="load-block"></div><div class="load-block"></div>
      <div class="load-block"></div><div class="load-block"></div><div class="load-block"></div>
      <div class="load-block"></div><div class="load-block"></div><div class="load-block"></div>
      <div class="load-block"></div>
    </div>
  </div>
  <div id="overlay" class="hidden"></div>
  <div id="mobile-joystick"><div id="mobile-joystick-knob"></div></div>
  <div id="mobile-chat-btn">💬</div>
  <input id="chat-input" type="text" maxlength="100" placeholder="Say something..." autocomplete="off" />
  <div id="chat-toast"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
